<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FUJI SIM</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg:       #0a0a0a;
  --border:   rgba(255,255,255,0.09);
  --text:     #d8d4cc;
  --muted:    #5a5a58;
  --gray:     #888884;
  --topbar-h: 52px;
  --opt-h:    72px;   /* single-slider row height */
  --strip-h:  136px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'DM Mono',monospace; color:var(--text); }

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top:0; left:0; right:0; height:var(--topbar-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  z-index:80;
  background:linear-gradient(to bottom,rgba(10,10,10,0.96),transparent);
}
#btnOpen {
  width:36px; height:36px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:1px solid var(--border); border-radius:50%;
  color:var(--gray); font-size:18px; cursor:pointer; transition:all .15s;
}
#btnOpen:hover { border-color:var(--gray); color:var(--text); }
#btnSave {
  background:none; border:1px solid var(--border);
  color:var(--gray); font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  padding:7px 20px; border-radius:20px; cursor:pointer; transition:all .15s;
}
#btnSave:hover { border-color:var(--gray); color:var(--text); }
#hudCode { font-size:10px; letter-spacing:2.5px; color:var(--gray); min-width:60px; text-align:right; }

/* ── STAGE — always fills full screen, never shrinks ── */
#stage {
  position:fixed;
  top:var(--topbar-h); left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
  overflow:hidden;
  touch-action:none; /* we handle touch ourselves */
}

/* Canvas wrapper — transforms applied here for pinch/zoom */
#canvasWrap {
  position:relative;
  display:flex; align-items:center; justify-content:center;
  width:100%; height:100%;
  transform-origin:center center;
}

#previewCanvas {
  max-width:100%; max-height:100%;
  width:auto; height:auto;
  display:none;
  user-select:none;
  pointer-events:none;
}

/* Upload prompt */
#uploadPrompt {
  position:absolute;
  display:flex; flex-direction:column; align-items:center; gap:14px;
  cursor:pointer; opacity:.45; transition:opacity .2s; user-select:none;
}
#uploadPrompt:hover { opacity:.7; }
.up-ring {
  width:60px; height:60px; border:1px solid var(--muted); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; color:var(--muted);
}
.up-text { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }

/* Original toast */
#origToast {
  position:fixed; top:60px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.65); border:1px solid rgba(200,200,200,0.15);
  border-radius:20px; padding:5px 14px;
  font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--gray);
  z-index:90; pointer-events:none; opacity:0; transition:opacity .2s;
}
#origToast.show { opacity:1; }

/* ── BOTTOM UI — sits OVER the stage (no layout shift) ── */
#bottomUI {
  position:fixed; left:0; right:0; bottom:0;
  z-index:70;
  display:flex; flex-direction:column;
  pointer-events:none; /* children re-enable */
}

/* ── SINGLE SLIDER ROW (active option) ── */
#optRow {
  pointer-events:auto;
  height:0; overflow:hidden;
  transition:height .32s cubic-bezier(.32,.72,0,1);
  background:rgba(10,10,10,0.72);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center;
  padding:0 24px;
  gap:16px;
}
#optRow.open { height:var(--opt-h); }

.opt-label {
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); flex-shrink:0; min-width:44px;
}
.opt-val {
  font-size:10px; letter-spacing:1px; color:var(--gray);
  flex-shrink:0; min-width:24px; text-align:right;
}
#activeSlider {
  flex:1;
  -webkit-appearance:none; appearance:none;
  height:2px; background:rgba(255,255,255,0.15);
  border-radius:1px; outline:none; cursor:pointer;
}
#activeSlider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:22px; height:22px; border-radius:50%;
  background:var(--gray);
  box-shadow:0 0 8px rgba(0,0,0,0.9);
  cursor:pointer; transition:transform .1s;
}
#activeSlider:active::-webkit-slider-thumb { transform:scale(1.2); }
#activeSlider::-moz-range-thumb {
  width:22px; height:22px; border-radius:50%; border:none;
  background:var(--gray); cursor:pointer;
}

/* ── OPTION ICON ROW ── */
#optIcons {
  pointer-events:auto;
  display:none; /* shown after image load */
  align-items:center; justify-content:center;
  gap:0;
  height:48px;
  background:rgba(10,10,10,0.72);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.07);
  padding:0 8px;
}

.opt-icon-btn {
  flex:1;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; height:100%; cursor:pointer;
  border:none; background:none;
  transition:opacity .15s;
  padding:0 4px;
}
.opt-icon-btn:active { opacity:.6; }

.opt-icon-svg {
  width:18px; height:18px;
  opacity:.45;
  transition:opacity .15s;
}
.opt-icon-btn.active .opt-icon-svg { opacity:1; }

.opt-icon-label {
  font-family:'DM Mono',monospace;
  font-size:7.5px; letter-spacing:1px; text-transform:uppercase;
  color:var(--muted); transition:color .15s;
}
.opt-icon-btn.active .opt-icon-label { color:var(--gray); }

/* ── FILTER STRIP ── */
#filterStrip {
  pointer-events:auto;
  flex-shrink:0; height:var(--strip-h);
  background:rgba(8,8,8,0.88);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-top:1px solid var(--border);
  display:flex; flex-direction:column;
  padding:8px 0 10px;
}
.strip-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px 6px; flex-shrink:0;
}
.strip-title { font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); }

#filterScroll {
  display:flex; gap:12px; padding:0 18px;
  overflow-x:auto; overflow-y:hidden;
  flex:1; align-items:center; scrollbar-width:none;
}
#filterScroll::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; user-select:none;
  opacity:0; transform:translateY(20px);
  transition:opacity .35s, transform .35s;
}
.chip.visible { opacity:1; transform:translateY(0); }

.chip-thumb {
  width:72px; height:54px; border-radius:6px;
  border:2px solid transparent; overflow:hidden;
  transition:border-color .15s, transform .15s;
  background:#1a1a1a;
}
.chip-thumb canvas { width:100%; height:100%; display:block; }
.chip.active .chip-thumb { border-color:var(--gray); transform:scale(1.06); }
.chip-code { font-size:9px; letter-spacing:1px; color:var(--muted); transition:color .15s; }
.chip.active .chip-code { color:var(--text); }

#fileInput { display:none; }
</style>
</head>
<body>

<div id="topbar">
  <button id="btnOpen">‹</button>
  <button id="btnSave">저장</button>
  <div id="hudCode">—</div>
</div>

<div id="stage">
  <div id="canvasWrap">
    <div id="uploadPrompt">
      <div class="up-ring">+</div>
      <div class="up-text">사진을 클릭하거나 드래그</div>
    </div>
    <canvas id="previewCanvas"></canvas>
  </div>
</div>

<div id="origToast">ORIGINAL</div>

<div id="bottomUI">

  <!-- Single active slider -->
  <div id="optRow">
    <span class="opt-label" id="optLabel">노출</span>
    <input type="range" id="activeSlider" min="-50" max="50" value="0">
    <span class="opt-val" id="optVal">0</span>
  </div>

  <!-- Option icon row -->
  <div id="optIcons">
    <!-- icons injected by JS -->
  </div>

  <!-- Filter strip -->
  <div id="filterStrip">
    <div class="strip-header">
      <span class="strip-title">사진 필터</span>
    </div>
    <div id="filterScroll"></div>
  </div>

</div>

<input type="file" id="fileInput" accept="image/*">

<script>
// ── Option definitions ──
const OPTIONS = [
  { key:'exp',   label:'노출',   min:-50,  max:50,  val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/></svg>` },
  { key:'sat',   label:'채도',   min:-100, max:100, val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 6a6 6 0 0 1 0 12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>` },
  { key:'con',   label:'대비',   min:-50,  max:50,  val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M12 3a9 9 0 0 1 0 18z" fill="currentColor" stroke="none" opacity=".5"/><path d="M12 3a9 9 0 0 0 0 18V3z" fill="currentColor" stroke="none" opacity=".9"/></svg>` },
  { key:'hi',    label:'밝은부분', min:-50, max:50,  val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3l2.5 5 5.5.8-4 3.9.95 5.5L12 15.5l-4.95 2.7.95-5.5L4 8.8l5.5-.8z"/></svg>` },
  { key:'sh',    label:'어두운부분', min:-50, max:50, val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>` },
  { key:'warm',  label:'따뜻함',  min:-50,  max:50,  val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/><circle cx="12" cy="12" r="5"/></svg>` },
  { key:'grain', label:'그레인',  min:0,    max:60,  val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="8" r="1.2" fill="currentColor"/><circle cx="13" cy="5" r="1" fill="currentColor"/><circle cx="18" cy="9" r="1.2" fill="currentColor"/><circle cx="5" cy="14" r="1" fill="currentColor"/><circle cx="10" cy="17" r="1.2" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/><circle cx="20" cy="18" r="1.2" fill="currentColor"/><circle cx="4" cy="19" r="0.8" fill="currentColor"/></svg>` },
  { key:'vig',   label:'비네팅',  min:0,    max:100, val:0,
    icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"/><ellipse cx="12" cy="12" rx="6" ry="6" fill="none" stroke="currentColor" stroke-width="4" stroke-opacity=".25"/></svg>` },
];

let adj = {};
OPTIONS.forEach(o => { adj[o.key] = 0; });

let activeOptKey = null;

// ── Film data ──
const FILMS = [
  { id:'normal',         code:'Normal',     css:{contrast:1.00, saturate:1.00}, grain:0,  vignette:0  },
  { id:'provia',         code:'F1',         css:{contrast:1.05, saturate:1.10}, grain:4,  vignette:10 },
  { id:'velvia',         code:'F2',         css:{contrast:1.20, saturate:1.60}, grain:3,  vignette:20, overlay:{color:'#001830',opacity:.06,blend:'multiply'} },
  { id:'classic_chrome', code:'F3',         css:{contrast:1.12, saturate:0.75}, grain:10, vignette:25, overlay:{color:'#3a2a1a',opacity:.12,blend:'multiply'} },
  { id:'classic_neg',    code:'F4',         css:{contrast:1.08, saturate:0.90}, grain:12, vignette:30, overlay:{color:'#2a1a08',opacity:.15,blend:'multiply'} },
  { id:'eterna',         code:'Cinematic1', css:{contrast:0.92, saturate:0.85}, grain:8,  vignette:35, overlay:{color:'#0a0a1a',opacity:.10,blend:'multiply'} },
  { id:'eterna_bleach',  code:'F5',         css:{contrast:1.30, saturate:0.45}, grain:15, vignette:40, overlay:{color:'#101010',opacity:.12,blend:'multiply'} },
  { id:'acros',          code:'FBW1',       css:{contrast:1.15, saturate:0.00}, grain:8,  vignette:30 },
  { id:'acros_r',        code:'FBW2',       css:{contrast:1.25, saturate:0.00}, grain:8,  vignette:30 },
  { id:'pro400h',        code:'F6',         css:{contrast:0.95, saturate:0.90}, grain:7,  vignette:15, overlay:{color:'#e8d8c0',opacity:.08,blend:'screen'} },
  { id:'nostalgic_neg',  code:'F7',         css:{contrast:1.00, saturate:0.85}, grain:14, vignette:28, overlay:{color:'#c87820',opacity:.10,blend:'multiply'} },
];

let currentFilm = FILMS[0];
let sourceImage  = null;
let showOrig     = false;
let origTimer    = null;

// ── Build option icon row ──
const optIcons  = document.getElementById('optIcons');
const optRow    = document.getElementById('optRow');
const optLabel  = document.getElementById('optLabel');
const optVal    = document.getElementById('optVal');
const activeSlider = document.getElementById('activeSlider');
const iconBtns  = [];

OPTIONS.forEach(opt => {
  const btn = document.createElement('button');
  btn.className = 'opt-icon-btn';
  btn.innerHTML = `
    <svg class="opt-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">${opt.icon.match(/<svg[^>]*>(.*)<\/svg>/s)?.[1] || ''}</svg>
    <span class="opt-icon-label">${opt.label}</span>`;

  // fix: use full svg string
  btn.innerHTML = `${opt.icon.replace('<svg ', '<svg class="opt-icon-svg" ')}<span class="opt-icon-label">${opt.label}</span>`;

  btn.addEventListener('click', () => {
    if (activeOptKey === opt.key) {
      // toggle off
      activeOptKey = null;
      iconBtns.forEach(b => b.classList.remove('active'));
      optRow.classList.remove('open');
    } else {
      activeOptKey = opt.key;
      iconBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // update slider
      optLabel.textContent = opt.label;
      activeSlider.min   = opt.min;
      activeSlider.max   = opt.max;
      activeSlider.value = adj[opt.key];
      optVal.textContent = adj[opt.key];
      optRow.classList.add('open');
    }
  });

  optIcons.appendChild(btn);
  iconBtns.push(btn);
});

// Slider change
activeSlider.addEventListener('input', () => {
  if (!activeOptKey) return;
  const v = parseFloat(activeSlider.value);
  adj[activeOptKey] = v;
  optVal.textContent = v;
  // update OPTIONS val reference too
  const opt = OPTIONS.find(o => o.key === activeOptKey);
  if (opt) opt.val = v;
  if (sourceImage) renderImage();
});

// ── Film pixel renderer ──
function applyFilm(srcCanvas, film, a) {
  const w = srcCanvas.width, h = srcCanvas.height;
  const ctx2 = srcCanvas.getContext('2d');
  const id = ctx2.getImageData(0,0,w,h), d = id.data;

  const expF    = 1 + a.exp  / 100;
  const satMult = (film.css.saturate ?? 1) + a.sat / 100;
  const conMult = (film.css.contrast ?? 1) + a.con / 100;
  const hiAdj   = a.hi  / 200;
  const shAdj   = a.sh  / 200;
  const warmR   = a.warm > 0 ?  a.warm / 300 : 0;
  const warmB   = a.warm < 0 ? -a.warm / 300 : 0;

  for (let i = 0; i < d.length; i += 4) {
    let r=d[i]/255, g=d[i+1]/255, b=d[i+2]/255;

    switch(film.id){
      case 'velvia':        r=Math.pow(r,.85); g=Math.pow(g,.88); b=Math.pow(b,1.1); break;
      case 'classic_chrome':{ const l=.299*r+.587*g+.114*b; r+=.04*(1-l); g+=.02*(1-l); b+=.03*l; break; }
      case 'classic_neg':   { const l=.299*r+.587*g+.114*b; r+=.06*(1-l); g+=.02*(1-l); break; }
      case 'eterna':        r=r*.85+.05; g=g*.85+.05; b=b*.85+.05; break;
      case 'eterna_bleach': { const l=.299*r+.587*g+.114*b; r=r*.4+l*.6; g=g*.4+l*.6; b=b*.4+l*.6; break; }
      case 'acros':         { const l=Math.pow(.299*r+.587*g+.114*b,.92); r=l;g=l;b=l; break; }
      case 'acros_r':       { const l=Math.pow(.55*r+.30*g+.15*b,.9); r=l;g=l;b=l; break; }
      case 'pro400h':       r=Math.pow(r,.95)*.95+.04; g=Math.pow(g,.95)*.96+.03; b=Math.pow(b,.92)*.92+.05; break;
      case 'nostalgic_neg': { const l=.299*r+.587*g+.114*b; r+=.08*l; b=b-.04*l+.04*(1-l); break; }
    }

    r*=expF; g*=expF; b*=expF;

    const lum=.299*r+.587*g+.114*b;
    if(hiAdj){ const hi=Math.max(0,lum-.5)*2; r+=hiAdj*hi; g+=hiAdj*hi; b+=hiAdj*hi; }
    if(shAdj){ const sh=Math.max(0,.5-lum)*2; r+=shAdj*sh; g+=shAdj*sh; b+=shAdj*sh; }
    r+=warmR; b+=warmB;

    if(satMult!==1){ const l=.299*r+.587*g+.114*b; r=l+(r-l)*satMult; g=l+(g-l)*satMult; b=l+(b-l)*satMult; }
    r=(r-.5)*conMult+.5; g=(g-.5)*conMult+.5; b=(b-.5)*conMult+.5;

    d[i]  =Math.max(0,Math.min(255,r*255));
    d[i+1]=Math.max(0,Math.min(255,g*255));
    d[i+2]=Math.max(0,Math.min(255,b*255));
  }
  ctx2.putImageData(id,0,0);

  if(film.overlay){
    ctx2.globalCompositeOperation=film.overlay.blend;
    ctx2.globalAlpha=film.overlay.opacity;
    ctx2.fillStyle=film.overlay.color;
    ctx2.fillRect(0,0,w,h);
    ctx2.globalCompositeOperation='source-over';
    ctx2.globalAlpha=1;
  }

  const vigAmt=(film.vignette||0)+a.vig;
  if(vigAmt>0){
    const vg=ctx2.createRadialGradient(w/2,h/2,Math.min(w,h)*.3,w/2,h/2,Math.max(w,h)*.8);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(0,0,0,${vigAmt/200})`);
    ctx2.fillStyle=vg; ctx2.fillRect(0,0,w,h);
  }

  const grainAmt=(film.grain||0)+a.grain;
  if(grainAmt>0){
    const gid=ctx2.getImageData(0,0,w,h), gd=gid.data;
    for(let i=0;i<gd.length;i+=4){
      const n=(Math.random()-.5)*grainAmt*2;
      gd[i]  =Math.max(0,Math.min(255,gd[i]+n));
      gd[i+1]=Math.max(0,Math.min(255,gd[i+1]+n));
      gd[i+2]=Math.max(0,Math.min(255,gd[i+2]+n));
    }
    ctx2.putImageData(gid,0,0);
  }
}

// ── Build filter chips ──
const filterScroll = document.getElementById('filterScroll');
const chipEls = [];

FILMS.forEach((film, i) => {
  const chip = document.createElement('div');
  chip.className = 'chip' + (i===0?' active':'');
  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'chip-thumb';
  const tc = document.createElement('canvas');
  thumbWrap.appendChild(tc);
  const lbl = document.createElement('div');
  lbl.className = 'chip-code';
  lbl.textContent = film.code;
  chip.appendChild(thumbWrap);
  chip.appendChild(lbl);
  chip.addEventListener('click', () => {
    chipEls.forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilm = film;
    document.getElementById('hudCode').textContent = film.code;
    if(sourceImage) renderImage();
  });
  filterScroll.appendChild(chip);
  chipEls.push(chip);
  film._tc = tc;
});

function generateThumbnails() {
  const img = sourceImage;
  const TW=108, TH=80;
  FILMS.forEach((film, i) => {
    const tc = film._tc;
    tc.width=TW; tc.height=TH;
    tc.getContext('2d').drawImage(img,0,0,TW,TH);
    applyFilm(tc, film, {exp:0,sat:0,con:0,hi:0,sh:0,warm:0,grain:0,vig:0});
    setTimeout(()=>{ chipEls[i].classList.add('visible'); }, i*45);
  });
}

// ── Upload ──
const uploadPrompt = document.getElementById('uploadPrompt');
const canvas       = document.getElementById('previewCanvas');
const ctx          = canvas.getContext('2d');
const fileInput    = document.getElementById('fileInput');
const btnOpen      = document.getElementById('btnOpen');
const btnSave      = document.getElementById('btnSave');
const stage        = document.getElementById('stage');
const canvasWrap   = document.getElementById('canvasWrap');

btnOpen.addEventListener('click', ()=>fileInput.click());
uploadPrompt.addEventListener('click', ()=>fileInput.click());
stage.addEventListener('dragover', e=>e.preventDefault());
stage.addEventListener('drop', e=>{ e.preventDefault(); const f=e.dataTransfer.files[0]; if(f)loadImage(f); });
fileInput.addEventListener('change', e=>{ if(e.target.files[0])loadImage(e.target.files[0]); });

function resetAdj() {
  OPTIONS.forEach(o=>{ o.val=0; adj[o.key]=0; });
  activeSlider.value=0; optVal.textContent=0;
  activeOptKey=null;
  iconBtns.forEach(b=>b.classList.remove('active'));
  optRow.classList.remove('open');
}

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      uploadPrompt.style.display = 'none';
      canvas.style.display = 'block';
      optIcons.style.display = 'flex';

      // Reset
      currentFilm = FILMS[0];
      document.getElementById('hudCode').textContent = FILMS[0].code;
      chipEls.forEach(c=>c.classList.remove('active'));
      chipEls[0].classList.add('active');
      resetAdj();
      resetZoom();
      chipEls.forEach(c=>c.classList.remove('visible'));

      renderImage();
      generateThumbnails();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Main render ──
function renderImage() {
  if(showOrig || !sourceImage) return;
  const img=sourceImage, maxW=2400;
  let w=img.width, h=img.height;
  if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
  canvas.width=w; canvas.height=h;
  ctx.drawImage(img,0,0,w,h);
  applyFilm(canvas, currentFilm, adj);
}

// ── Tap to show original ──
const origToast = document.getElementById('origToast');
let tapTimeout = null;

stage.addEventListener('click', e => {
  // Only single-tap on canvas area, not on UI
  if(!sourceImage) return;
  if(e.target.closest('#bottomUI')) return;
  if(showOrig) return;
  showOrig=true;
  origToast.classList.add('show');
  const img=sourceImage, maxW=2400;
  let w=img.width, h=img.height;
  if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
  canvas.width=w; canvas.height=h;
  ctx.drawImage(img,0,0,w,h);
  if(origTimer)clearTimeout(origTimer);
  origTimer=setTimeout(()=>{
    showOrig=false;
    origToast.classList.remove('show');
    renderImage();
  }, 3000);
});

// ── Pinch zoom ──
let scale      = 1;
let translateX = 0;
let translateY = 0;

// gesture snapshot taken at touchstart
let gestureStartScale = 1;
let gestureStartTx    = 0;
let gestureStartTy    = 0;
let gestureStartDist  = 0;
let gestureStartMidX  = 0;
let gestureStartMidY  = 0;

// pan snapshot
let panStartX = 0;
let panStartY = 0;
let isPanning = false;

function applyTransform() {
  canvasWrap.style.transition = 'none';
  canvasWrap.style.transform  = `translate(${translateX}px,${translateY}px) scale(${scale})`;
}

function resetZoom() {
  scale = 1; translateX = 0; translateY = 0;
  canvasWrap.style.transition = 'transform .25s ease';
  canvasWrap.style.transform  = 'translate(0,0) scale(1)';
}

function getTouchDist(t1, t2) {
  const dx = t1.clientX - t2.clientX;
  const dy = t1.clientY - t2.clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

stage.addEventListener('touchstart', e => {
  if (e.target.closest('#bottomUI')) return;
  const ts = e.touches;

  if (ts.length === 2) {
    // snapshot current state at pinch start
    gestureStartScale = scale;
    gestureStartTx    = translateX;
    gestureStartTy    = translateY;
    gestureStartDist  = getTouchDist(ts[0], ts[1]);
    gestureStartMidX  = (ts[0].clientX + ts[1].clientX) / 2;
    gestureStartMidY  = (ts[0].clientY + ts[1].clientY) / 2;
    isPanning = false;
    e.preventDefault();
  } else if (ts.length === 1) {
    isPanning  = true;
    panStartX  = ts[0].clientX - translateX;
    panStartY  = ts[0].clientY - translateY;
  }
}, { passive: false });

stage.addEventListener('touchmove', e => {
  if (e.target.closest('#bottomUI')) return;
  e.preventDefault();
  const ts = e.touches;

  if (ts.length === 2) {
    isPanning = false;
    const newDist = getTouchDist(ts[0], ts[1]);
    const ratio   = newDist / gestureStartDist;
    const newScale = Math.max(1, Math.min(5, gestureStartScale * ratio));

    // move with midpoint delta
    const midX = (ts[0].clientX + ts[1].clientX) / 2;
    const midY = (ts[0].clientY + ts[1].clientY) / 2;

    translateX = gestureStartTx + (midX - gestureStartMidX);
    translateY = gestureStartTy + (midY - gestureStartMidY);
    scale      = newScale;
    applyTransform();

  } else if (ts.length === 1 && isPanning && scale > 1) {
    translateX = ts[0].clientX - panStartX;
    translateY = ts[0].clientY - panStartY;
    applyTransform();
  }
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (e.target.closest('#bottomUI')) return;
  if (e.touches.length === 0 && scale < 1.05) {
    // snap back to 1 if barely zoomed
    resetZoom();
  }
  if (e.touches.length < 2) {
    // after pinch ends, update pan start to current position
    if (e.touches.length === 1) {
      isPanning = true;
      panStartX = e.touches[0].clientX - translateX;
      panStartY = e.touches[0].clientY - translateY;
    }
  }
}, { passive: true });

// Double-tap to reset zoom
let lastTap = 0;
stage.addEventListener('touchend', e => {
  if (e.target.closest('#bottomUI')) return;
  const now = Date.now();
  if (now - lastTap < 280 && e.changedTouches.length === 1) {
    resetZoom();
    lastTap = 0;
  } else {
    lastTap = now;
  }
}, { passive: true });

// ── Download ──
btnSave.addEventListener('click', ()=>{
  if(!sourceImage) return;
  const a=document.createElement('a');
  a.download=`fujisim_${currentFilm.code}.jpg`;
  a.href=canvas.toDataURL('image/jpeg',.95);
  a.click();
});
</script>
